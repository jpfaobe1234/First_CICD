<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Freelance Budgeter | CI/CD Project</title>
        <link rel="stylesheet" href="src/style.css" />
    </head>
    <body>
        <div class="container">
            <h1>Freelance Budgeter 💼</h1>
            <p class="status">
                Pipeline Status: <span class="badge">Protected by CI/CD</span>
            </p>

            <div class="card">
                <label for="ht">Montant HT (€)</label>
                <input type="number" id="ht" placeholder="Ex: 500" min="0" />

                <button onclick="updateUI()">Calculer TTC</button>

                <div class="result">Total TTC : <span id="ttc">0</span> €</div>
            </div>
        </div>

        <script src="src/logic.js"></script>
        <script>
            function updateUI() {
                const ht = parseFloat(document.getElementById('ht').value);
                const res = calculerTTC(ht);
                document.getElementById('ttc').innerText = res;
            }
        </script>
    </body>
</html>
